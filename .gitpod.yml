image: gitpod/workspace-full

tasks:
  - init: |
      python -m pip install -r requirements.txt
      cd dashboard && npm install && cd ..
      cd remotion && npm install && cd ..
      cd render-service && npm install && cd ..
    command: |
      docker-compose up -d

ports:
  - port: 5173
    onOpen: open-preview
  - port: 8000
    onOpen: ignore
  - port: 3000
    onOpen: ignore
  - port: 8080
    onOpen: ignore

vscode:
  extensions:
    - ms-python.python
    - ms-python.vscode-pylance
    - dbaeumer.vscode-eslint
